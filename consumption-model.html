<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Keynesian Consumption Model</title>
    <style>
        body { 
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif; 
            max-width: 700px; 
            margin: 20px auto; 
            padding: 20px; 
            background-color: #f9fafb; 
            color: #111827; 
        }
        h2 { text-align: center; color: #1f2937; }
        .panel { 
            background: white; 
            padding: 20px; 
            border-radius: 8px; 
            box-shadow: 0 4px 6px -1px rgba(0, 0, 0, 0.1); 
            margin-bottom: 20px; 
        }
        .control-group { margin-bottom: 15px; }
        label { display: block; font-weight: 600; margin-bottom: 5px; }
        input[type=range] { width: 100%; cursor: pointer; }
        .info-text { font-size: 0.85em; color: #6b7280; }
        canvas { 
            background: white; 
            border: 1px solid #e5e7eb; 
            border-radius: 8px; 
            width: 100%; 
            max-width: 660px; 
            height: 350px; 
            box-shadow: 0 4px 6px -1px rgba(0, 0, 0, 0.1); 
        }
        .result { 
            background: #dbeafe; 
            padding: 15px; 
            border-radius: 8px; 
            color: #1e40af; 
            font-weight: 500; 
            text-align: center; 
            font-size: 1.1em; 
            margin-top: 20px;
        }
    </style>
</head>
<body>

    <h2>Interactive Keynesian Consumption Function</h2>
    
    <div class="panel">
        <div class="control-group">
            <label>Autonomous Consumption (a): $<span id="valA">500</span></label>
            <input type="range" id="sliderA" min="0" max="2000" step="100" value="500">
            <div class="info-text">Baseline spending when disposable income is zero.</div>
        </div>
        <div class="control-group">
            <label>Marginal Propensity to Consume (MPC): <span id="valB">0.60</span></label>
            <input type="range" id="sliderB" min="0.1" max="0.9" step="0.05" value="0.60">
            <div class="info-text">The fraction of each additional dollar of income that is spent.</div>
        </div>
    </div>

    <canvas id="graph" width="660" height="350"></canvas>

    <div class="result">
        Breakeven Income (Where C = Yd): $<span id="breakeven">1250</span>
    </div>

    <script>
        const canvas = document.getElementById('graph');
        const ctx = canvas.getContext('2d');
        const sliderA = document.getElementById('sliderA');
        const sliderB = document.getElementById('sliderB');
        const valA = document.getElementById('valA');
        const valB = document.getElementById('valB');
        const breakevenText = document.getElementById('breakeven');

        // Coordinate system configuration
        const padX = 60;
        const padY = 40;
        const maxX = 10000;
        const maxY = 10000;

        function drawGraph() {
            const a = parseFloat(sliderA.value);
            const b = parseFloat(sliderB.value);
            
            // Update Text Values
            valA.textContent = a;
            valB.textContent = b.toFixed(2);
            
            // Calculate Breakeven
            const breakeven = a / (1 - b);
            breakevenText.textContent = Math.round(breakeven).toLocaleString();

            // Clear Canvas
            ctx.clearRect(0, 0, canvas.width, canvas.height);
            
            // Helper functions to map values to canvas coordinates
            const getX = (val) => padX + (val / maxX) * (canvas.width - padX - 20);
            const getY = (val) => canvas.height - padY - (val / maxY) * (canvas.height - padY - 20);

            // Draw Background Grid
            ctx.beginPath();
            ctx.strokeStyle = "#f3f4f6";
            ctx.lineWidth = 1;
            for(let i = 0; i <= 10000; i += 1000) {
                ctx.moveTo(getX(i), getY(0)); ctx.lineTo(getX(i), getY(10000));
                ctx.moveTo(getX(0), getY(i)); ctx.lineTo(getX(10000), getY(i));
            }
            ctx.stroke();

            // Draw X and Y Axes
            ctx.beginPath();
            ctx.strokeStyle = "#9ca3af";
            ctx.lineWidth = 2;
            ctx.moveTo(getX(0), getY(0)); ctx.lineTo(getX(10000), getY(0));
            ctx.moveTo(getX(0), getY(0)); ctx.lineTo(getX(0), getY(10000));
            ctx.stroke();

            // Draw Axis Labels & Numbers
            ctx.fillStyle = "#4b5563";
            ctx.font = "12px sans-serif";
            ctx.textAlign = "center";
            for(let i = 0; i <= 10000; i += 2000) {
                if (i > 0) {
                    ctx.fillText(i, getX(i), canvas.height - 20); // X-axis numbers
                }
            }
            
            // Y-axis label (Rotated)
            ctx.save();
            ctx.translate(20, canvas.height / 2);
            ctx.rotate(-Math.PI / 2);
            ctx.textAlign = "center";
            ctx.font = "bold 13px sans-serif";
            ctx.fillText("Consumption (C) in $", 0, 0);
            ctx.restore();
            
            // X-axis label
            ctx.font = "bold 13px sans-serif";
            ctx.fillText("Disposable Income (Yd) in $", canvas.width / 2, canvas.height - 5);

            // Draw 45-Degree Reference Line (C = Yd)
            ctx.beginPath();
            ctx.strokeStyle = "#9ca3af";
            ctx.lineWidth = 2;
            ctx.setLineDash([5, 5]);
            ctx.moveTo(getX(0), getY(0));
            ctx.lineTo(getX(10000), getY(10000));
            ctx.stroke();
            ctx.setLineDash([]); // Reset dashed line

            // Draw Main Consumption Line (C = a + bYd)
            ctx.beginPath();
            ctx.strokeStyle = "#2563eb"; // Strong Blue
            ctx.lineWidth = 3;
            ctx.moveTo(getX(0), getY(a));
            ctx.lineTo(getX(10000), getY(a + b * 10000));
            ctx.stroke();

            // Draw Breakeven Point Marker
            if (breakeven <= 10000) {
                ctx.beginPath();
                ctx.fillStyle = "#dc2626"; // Red dot
                ctx.arc(getX(breakeven), getY(breakeven), 6, 0, Math.PI * 2);
                ctx.fill();
            }
        }

        // Add Listeners to Sliders
        sliderA.addEventListener('input', drawGraph);
        sliderB.addEventListener('input', drawGraph);
        
        // Initial Draw
        drawGraph();
    </script>
</body>
</html>
